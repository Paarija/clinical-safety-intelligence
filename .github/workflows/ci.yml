name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python 3.11
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Local verification:
      #   python -m pip install -e ".[dev]"
      #   ruff check src tests
      #   pytest --cov=clinical_safety tests/ --cov-report=term-missing --cov-fail-under=20
      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint (local: ruff check src tests)
        run: ruff check src tests

      - name: Test with coverage (local: pytest --cov=clinical_safety tests/ --cov-report=term-missing --cov-fail-under=20)
        run: pytest --cov=clinical_safety tests/ --cov-report=term-missing --cov-fail-under=20
